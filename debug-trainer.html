<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GramFrame Trainer Page</title>
  <link rel="stylesheet" href="./src/gramframe.css" />
  <script type="module" src="./src/main.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      padding: 20px;
      margin: 0;
    }

    h1 {
      color: #333;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
    }

    .page-nav {
      margin-bottom: 15px;
      font-size: 14px;
    }

    .page-nav a {
      color: #1a73e8;
    }

    .context-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      background-color: #1b5e20;
      color: #fff;
      margin-left: 10px;
      vertical-align: middle;
    }

    .component-container {
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background-color: #f9f9f9;
      min-width: 1020px;
    }

    .component-container img,
    .gram-frame-container {
      width: 100%;
      height: auto;
    }

    table.gram-config {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    table.gram-config th,
    table.gram-config td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>GramFrame Trainer Page <span class="context-badge">TRAINER — localStorage</span></h1>
  <div class="page-nav">
    <a href="debug.html">&larr; Student page (sessionStorage)</a>
    &nbsp;|&nbsp;
    <a href="debug-multiple.html">Multi-gram page</a>
    &nbsp;|&nbsp;
    <!-- This ANALYSIS link triggers trainer context detection in storage.js -->
    <a href="#">ANALYSIS</a>
  </div>

  <div class="component-container">
    <h2>Component Instance</h2>

    <table class="gram-config">
      <tr>
        <td colspan="2">
          <img src="./sample/mock-gram.png" alt="Sample Spectrogram">
        </td>
      </tr>
      <tr>
        <td>time-start</td>
        <td>0</td>
      </tr>
      <tr>
        <td>time-end</td>
        <td>60</td>
      </tr>
      <tr>
        <td>freq-start</td>
        <td>0</td>
      </tr>
      <tr>
        <td>freq-end</td>
        <td>100</td>
      </tr>
    </table>
  </div>
</body>
</html>
