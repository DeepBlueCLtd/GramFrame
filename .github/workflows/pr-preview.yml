name: PR Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build standalone bundle
        run: |
          yarn build:standalone
          if [ ! -f "dist/gramframe.bundle.js" ]; then
            echo "Build failed: gramframe.bundle.js not found"
            exit 1
          fi

      - name: Prepare preview site
        run: |
          mkdir -p preview
          cp dist/gramframe.bundle.js preview/
          cp test-release.html preview/index.html
          cp sample/mock-gram.png preview/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./preview
          destination_dir: pr/${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment on PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner.toLowerCase();
            const repo = context.repo.repo;
            const previewUrl = `https://${owner}.github.io/${repo}/pr/${prNumber}/`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = '<!-- pr-preview-comment -->';
            const botComment = comments.data.find(c => c.body.includes(marker));

            const body = [
              marker,
              '### PR Preview',
              '',
              `Preview deployment is ready! **[View Preview](${previewUrl})**`,
              '',
              `_Last updated: ${new Date().toISOString()}_`,
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Remove preview directory
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          if [ -d "pr/$PR_NUMBER" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "pr/$PR_NUMBER"
            git commit -m "Remove PR #$PR_NUMBER preview"
            git push origin gh-pages
          else
            echo "No preview directory found for PR #$PR_NUMBER, nothing to clean up"
          fi
